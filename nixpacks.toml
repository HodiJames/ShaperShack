[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["cd backend && python -m venv /app/venv && /app/venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'No frontend build needed'"]

[start]
cmd = "/app/venv/bin/python -m uvicorn backend.server:app --host 0.0.0.0 --port ${PORT:-8001}"
